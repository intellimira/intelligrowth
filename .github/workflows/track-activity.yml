name: Track GitHub Activity

on:
  schedule:
    # Run daily at 9am
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  track-activity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Run activity tracker
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python3 Memory_Mesh/track_activity.py
      
      - name: Report
        if: success()
        run: echo "✅ Activity tracked successfully"